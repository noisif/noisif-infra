<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOISIF | Community audio platform and soundboard system for Discord</title>
  <link rel="icon" href="./favicon-32.ico" sizes="any">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: 'Satoshi';
      src: url('./satoshi.woff2') format('woff2');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Satoshi', sans-serif;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    .logo {
      width: 200px;
      height: 200px;
      animation: pulse 3s ease-in-out infinite;
    }

    .gradient {
      position: fixed;
      opacity: .5;
      z-index: -1;
    }

    .left-gradient {
      left: -20%;
      bottom: -30%;
    }

    .right-gradient {
      top: -60%;
      right: -45%;
      rotate: 12deg;
    }

    .content-container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      height: 100vh;
    }

    .content-text-container {
      margin: 70px 0;
      font-size: 1.2rem;
      color: #4d4d4d;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }
  </style>
  <script defer src="https://analytics.miloszgilga.pl/script.js"
    data-website-id="da43f803-295a-4ce3-9a9e-ad26e4d53b2d"></script>
</head>

<body class="container">
  <div class="gradient left-gradient">
    <img src="./grad-left.webp">
  </div>
  <div class="gradient right-gradient">
    <img src="./grad-right.webp">
  </div>
  <div class="content-container">
    <div class="content-text-container">noisif</div>
    <a href="https://github.com/noisif">
      <img src="./logo.svg" alt="logo" class="logo">
    </a>
    <div class="content-text-container">soon</div>
  </div>
</body>

</html>
